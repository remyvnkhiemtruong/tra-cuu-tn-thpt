<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Tra cứu tài khoản thi TN THPT</title>
    <meta
      name="description"
      content="Tra cứu tài khoản và mã đăng nhập thi tốt nghiệp THPT Trường THPT Võ Văn Kiệt."
    >
    <link rel="preload" href="assets/logo-vvk.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="lookup-panel" aria-labelledby="page-title">
        <header class="site-header">
          <img
            class="school-logo"
            src="assets/logo-vvk.png"
            width="128"
            height="128"
            alt="Logo Trường THPT Võ Văn Kiệt"
          >
          <div class="school-heading">
            <p class="manager">Đơn vị quản lý: Sở GDĐT Tỉnh Cà Mau</p>
            <p class="school-name">Trường THPT Võ Văn Kiệt</p>
            <h1 id="page-title">Tra cứu tài khoản thi TN THPT</h1>
          </div>
        </header>

        <form id="lookup-form" class="lookup-form" novalidate>
          <div class="field-group">
            <label for="account">Số ĐDCN</label>
            <input
              id="account"
              name="account"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="Ví dụ: 095208001234"
              required
            >
          </div>

          <div class="field-group">
            <label for="dob">Ngày sinh</label>
            <input
              id="dob"
              name="dob"
              type="text"
              inputmode="numeric"
              autocomplete="bday"
              placeholder="dd/mm/yyyy"
              required
            >
          </div>

          <button id="submit-button" class="primary-action" type="submit">
            Tra cứu
          </button>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <section id="result" class="result-panel" hidden aria-labelledby="result-title">
          <h2 id="result-title">Thông tin đăng nhập</h2>
          <dl class="result-list">
            <div>
              <dt>Họ tên</dt>
              <dd id="result-name"></dd>
            </div>
            <div>
              <dt>Lớp</dt>
              <dd id="result-class"></dd>
            </div>
            <div>
              <dt>Tên tài khoản / Số ĐDCN</dt>
              <dd>
                <span id="result-account"></span>
                <button class="copy-action" type="button" data-copy-target="result-account">
                  Sao chép
                </button>
              </dd>
            </div>
            <div>
              <dt>Mã đăng nhập</dt>
              <dd>
                <span id="result-code"></span>
                <button class="copy-action" type="button" data-copy-target="result-code">
                  Sao chép
                </button>
              </dd>
            </div>
          </dl>
        </section>

        <footer class="site-footer">
          Copyright 2026 by Trương Minh Khiêm
        </footer>
      </section>
    </main>

    <script src="data/records.js"></script>
    <script src="app.js"></script>
  </body>
</html>
